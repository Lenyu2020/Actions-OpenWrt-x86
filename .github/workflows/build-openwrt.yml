name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .diffconfig
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    # 1. 检出你自己的仓库文件到一个单独的文件夹
    - name: Checkout main-repo
      uses: actions/checkout@v4
      with:
        path: main-repo

    # 2. 暴力清理系统根目录空间（释放约 30G+）
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: false  # 必须设为 false 以保留 Swap 避免内存溢出

    # 3. 检查清理后的真实可用空间
    - name: Check free space
      run: df -hT

    # 4. 初始化编译环境（此时根目录空间充足，不会再报错）
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    # 5. 克隆 OpenWrt 源码（直接拉取到默认工作区即可）
    - name: Clone source code
      run: git clone $REPO_URL -b $REPO_BRANCH openwrt

    # 6. 设置编译缓存
    - name: Cache
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        clean: 'false'
        prefix: ${{ github.workspace }}/openwrt

    # --- 以下所有针对源码的操作，均在 openwrt 目录下进行 ---

    - name: Install custom packages
      working-directory: openwrt
      run: |
        mkdir package/luci-app-openclash
        pushd package/luci-app-openclash
        git init
        git remote add -f origin https://github.com/vernesong/OpenClash.git
        git config core.sparsecheckout true
        echo "luci-app-openclash" >> .git/info/sparse-checkout
        git pull --depth 1 origin master
        git branch --set-upstream-to=origin/master
        popd

        pushd package
        git clone -b dev https://github.com/Blueplanet20120/luci-app-romupdate.git
        git clone https://github.com/messense/aliyundrive-webdav.git
        git clone https://github.com/kuoruan/luci-app-frpc.git
        popd

    - name: Load custom feeds
      working-directory: openwrt
      run: |
        [ -e ../main-repo/$FEEDS_CONF ] && mv ../main-repo/$FEEDS_CONF feeds.conf.default
        chmod +x ../main-repo/$DIY_P1_SH
        ../main-repo/$DIY_P1_SH
        bash ../main-repo/lenyu.sh

    - name: Update feeds
      working-directory: openwrt
      run: ./scripts/feeds update -a

    - name: Install feeds
      working-directory: openwrt
      run: ./scripts/feeds install -a

    - name: Load custom configuration
      working-directory: openwrt
      run: |
        [ -e ../main-repo/files ] && mv ../main-repo/files files
        [ -e ../main-repo/$CONFIG_FILE ] && mv ../main-repo/$CONFIG_FILE .config
        chmod +x ../main-repo/$DIY_P2_SH
        ../main-repo/$DIY_P2_SH

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      working-directory: openwrt
      id: package
      run: |
        echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      working-directory: openwrt
      id: compile
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage (Post-compile)
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Run rename.sh
      working-directory: openwrt
      run: |
        bash ../main-repo/rename.sh

    - name: Organize files
      working-directory: openwrt
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      working-directory: openwrt
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        touch release.txt
        [ -f wget/op_version1 ] && echo "release_tag=$(cat wget/op_version1)" >> $GITHUB_OUTPUT || echo "release_tag=OpenWrt_${{ env.FILE_DATE }}" >> $GITHUB_OUTPUT
        git log --pretty=format:"%s(#By %an)" --graph --since=3.hour >> release.txt
        
        git -C feeds/packages log --pretty=format:"%s(#By %an)" --graph --since=3.hour >> release.txt || true
        git -C feeds/luci log --pretty=format:"%s(#By %an)" --graph --since=3.hour >> release.txt || true
        git -C feeds/routing log --pretty=format:"%s(#By %an)" --graph --since=3.hour >> release.txt || true
        git -C feeds/telephony log --pretty=format:"%s(#By %an)" --graph --since=3.hour >> release.txt || true
        git -C feeds/helloworld log --pretty=format:"%s(#By %an)" --graph --since=4.hour >> release.txt || true
        git -C feeds/passwall log --pretty=format:"%s(#By %an)" --graph --since=8.hour >> release.txt || true
        git -C package/luci-app-openclash log --pretty=format:"%s(#By %an)" --graph --since=8.hour >> release.txt || true
        
        test ! -s release.txt && echo -e "\n* The source code is not updated." >> release.txt
        sed -i '1i ## Firmware Update Log' release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: openwrt/release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Lenyu2020/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 5

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
